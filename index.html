<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puzzle App</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>

<body class="bg-gray-100 dark:bg-gray-900 transition-colors">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const firebaseConfig = {
  apiKey: "DEIN_API_KEY",
  authDomain: "puzzle-app-f4ad3.firebaseapp.com",
  projectId: "puzzle-app-f4ad3",
  storageBucket: "puzzle-app-f4ad3.appspot.com",
  messagingSenderId: "DEINE_ID",
  appId: "DEINE_APP_ID"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function Input(props){
  return (
    <input
      {...props}
      className="w-full p-3 rounded-xl bg-gray-100 dark:bg-gray-700 text-black dark:text-white placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-blue-400"
    />
  );
}

function App() {

  const [puzzles, setPuzzles] = useState([]);
  const [dark, setDark] = useState(localStorage.getItem("dark") === "true");
  const [view, setView] = useState("home");
  const [search, setSearch] = useState("");
  const [showSearch, setShowSearch] = useState(false);
  const [brandFilter, setBrandFilter] = useState("Alle");
  const [editId, setEditId] = useState(null);
  const [selectedImage, setSelectedImage] = useState(null);
  const [showForm, setShowForm] = useState(false);

  const [form, setForm] = useState({
    name:"",
    pieces:"",
    brand:"",
    rating:0,
    image:""
  });

  useEffect(() => {
    const unsub = db.collection("puzzles").onSnapshot(snap => {
      setPuzzles(snap.docs.map(d => ({ id:d.id, ...d.data() })));
    });
    return () => unsub();
  }, []);

  useEffect(() => {
    document.documentElement.classList.toggle("dark", dark);
    localStorage.setItem("dark", dark);
  }, [dark]);

  const addOrUpdate = async () => {
    if (!form.name) return;

    const cleaned = {
      ...form,
      brand: form.brand.trim()
    };

    if (editId) {
      await db.collection("puzzles").doc(editId).set({
        ...cleaned,
        image: cleaned.image || puzzles.find(p => p.id === editId)?.image || ""
      });
      setEditId(null);
    } else {
      await db.collection("puzzles").add(cleaned);
    }

    setForm({ name:"", pieces:"", brand:"", rating:0, image:"" });
    setShowForm(false);
  };

  const editPuzzle = (p) => {
    setForm(p);
    setEditId(p.id);
    setShowForm(true);
  };

  const deletePuzzle = async (id) => {
    await db.collection("puzzles").doc(id).delete();
  };

  const handleImageUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const img = new Image();
    const reader = new FileReader();

    reader.onload = (event) => img.src = event.target.result;

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      const maxWidth = 600;
      const scale = maxWidth / img.width;

      canvas.width = maxWidth;
      canvas.height = img.height * scale;

      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      const compressed = canvas.toDataURL("image/jpeg", 0.6);
      setForm(prev => ({ ...prev, image: compressed }));
    };

    reader.readAsDataURL(file);
  };

  const brands = ["Alle", ...new Set(puzzles.map(p => p.brand).filter(Boolean))];

  const filtered = puzzles.filter(p => {
    const text = search.toLowerCase();

    return (
      (p.name?.toLowerCase().includes(text) ||
       p.brand?.toLowerCase().includes(text)) &&
      (brandFilter === "Alle" ||
       p.brand?.toLowerCase().trim() === brandFilter.toLowerCase().trim())
    );
  });

  const StarRating = ({ value, onChange }) => (
    <div className="flex gap-1">
      {[1,2,3,4,5].map(i => (
        <span key={i}
          className={`cursor-pointer text-xl ${i <= value ? 'text-yellow-400' : 'text-gray-400'}`}
          onClick={()=>onChange(i)}>
          ★
        </span>
      ))}
    </div>
  );

  return (
    <div className="p-4 max-w-md mx-auto text-gray-800 dark:text-gray-100">

      {/* Header */}
      <div className="flex justify-between items-center mb-4">
        <h1 className="text-2xl font-bold">🧩 Puzzle</h1>
        <div className="flex gap-2">
          <button onClick={()=>setView(view==='home'?'list':'home')} className="px-3 py-1 rounded-full bg-gray-200 dark:bg-gray-700">📊</button>
          <button onClick={()=>setShowSearch(!showSearch)} className="px-3 py-1 rounded-full bg-gray-200 dark:bg-gray-700">🔍</button>
          <button onClick={()=>setDark(!dark)} className="px-3 py-1 rounded-full bg-gray-200 dark:bg-gray-700">
            {dark ? "☀️" : "🌙"}
          </button>
        </div>
      </div>

      {/* HOME */}
      {view === 'home' && (
        <div className="space-y-3">
          <div className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow">
            <div className="text-sm opacity-60">Gesamt</div>
            <div className="text-2xl font-bold">{puzzles.length}</div>
          </div>

          <div className="bg-white dark:bg-gray-800 p-4 rounded-2xl shadow">
            <div className="text-sm opacity-60">Ø Teile</div>
            <div className="text-2xl font-bold">
              {puzzles.length ? Math.round(puzzles.reduce((s,p)=>s+Number(p.pieces||0),0)/puzzles.length) : 0}
            </div>
          </div>

          <button onClick={()=>setView('list')} className="w-full bg-blue-500 text-white p-3 rounded-xl">
            Zur Sammlung
          </button>
        </div>
      )}

      {/* LISTE */}
      {view === 'list' && (
        <>
          {showSearch && (
            <input
              className="w-full mb-3 p-2 rounded-xl bg-gray-100 dark:bg-gray-800"
              placeholder="Suchen..."
              value={search}
              onChange={e=>setSearch(e.target.value)}
            />
          )}

          <div className="mb-4">
            <select
              value={brandFilter}
              onChange={e=>setBrandFilter(e.target.value)}
              className="w-full p-2 rounded-xl bg-gray-100 dark:bg-gray-800 dark:text-white"
            >
              {brands.map(b => <option key={b}>{b}</option>)}
            </select>
          </div>

          {filtered.map(p => (
            <div key={p.id} className="bg-white dark:bg-gray-800 rounded-2xl shadow-md mb-4 overflow-hidden">

              {p.image && (
                <img
                  src={p.image}
                  className="w-full h-40 object-cover cursor-pointer"
                  onClick={()=>setSelectedImage(p.image)}
                />
              )}

              <div className="p-3">
                <div className="font-bold text-lg">{p.name}</div>
                <div className="text-sm opacity-60">{p.brand}</div>
                <div className="text-sm">{p.pieces} Teile</div>

                <StarRating value={p.rating || 0} onChange={()=>{}} />

                <div className="flex gap-2 mt-3">
                  <button onClick={()=>editPuzzle(p)} className="flex-1 bg-yellow-400 rounded-xl py-1">Bearbeiten</button>
                  <button onClick={()=>deletePuzzle(p.id)} className="flex-1 bg-red-500 text-white rounded-xl py-1">Löschen</button>
                </div>
              </div>
            </div>
          ))}
        </>
      )}

      {/* Floating Button */}
      {view === 'list' && (
        <button onClick={()=>setShowForm(true)} className="fixed bottom-6 right-6 bg-blue-500 text-white w-14 h-14 rounded-full text-2xl shadow-lg">
          +
        </button>
      )}

      {/* Modal */}
      {showForm && (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center">
          <div className="bg-white dark:bg-gray-800 p-4 rounded-2xl w-full max-w-sm space-y-2">
            <Input autoFocus placeholder="Motiv" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
            <Input placeholder="Teile" type="number" value={form.pieces} onChange={e=>setForm({...form,pieces:e.target.value})}/>
            <Input placeholder="Hersteller" value={form.brand} onChange={e=>setForm({...form,brand:e.target.value})}/>

            <StarRating value={form.rating} onChange={(val)=>setForm({...form, rating: val})} />

            <input type="file" onChange={handleImageUpload}/>

            <div className="flex gap-2 mt-3">
              <button onClick={addOrUpdate} className="flex-1 bg-blue-500 text-white rounded-xl p-2">Speichern</button>
              <button onClick={()=>setShowForm(false)} className="flex-1 bg-gray-300 dark:bg-gray-600 rounded-xl">Abbrechen</button>
            </div>
          </div>
        </div>
      )}

      {/* Bild Vollbild */}
      {selectedImage && (
        <div className="fixed inset-0 bg-black/80 flex items-center justify-center" onClick={()=>setSelectedImage(null)}>
          <img src={selectedImage} className="max-w-full max-h-full" />
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
