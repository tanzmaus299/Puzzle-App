<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puzzle App</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>

<body class="bg-gray-100">
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;

// 🔥 Firebase Config
const firebaseConfig = {
  apiKey: "AIzaSyB7U9ZXPKiA2FiBt5zu3F1FnX54DBj69R8",
  authDomain: "puzzle-app-f4ad3.firebaseapp.com",
  projectId: "puzzle-app-f4ad3",
  storageBucket: "puzzle-app-f4ad3.firebasestorage.app",
  messagingSenderId: "870893601279",
  appId: "1:870893601279:web:e79a91d0e1ebc18b0827ca"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function App() {
  const [puzzles, setPuzzles] = useState([]);
  const [search, setSearch] = useState("");
  const [filter, setFilter] = useState("Alle");
  const [editId, setEditId] = useState(null);
  const [selectedImage, setSelectedImage] = useState(null);

  const [form, setForm] = useState({
    name: "",
    pieces: "",
    brand: "",
    status: "Nicht gebaut",
    rating: "",
    image: "",
  });

  // 🔄 Live Sync mit Firebase
  useEffect(() => {
    const unsubscribe = db.collection("puzzles").onSnapshot(snapshot => {
      const data = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
      setPuzzles(data);
    });

    return () => unsubscribe();
  }, []);

  const addOrUpdatePuzzle = async () => {
    if (!form.name || !form.pieces) return;

    if (editId) {
      await db.collection("puzzles").doc(editId).set(form);
      setEditId(null);
    } else {
      await db.collection("puzzles").add(form);
    }

    setForm({ name:"", pieces:"", brand:"", status:"Nicht gebaut", rating:"", image:"" });
  };

  const editPuzzle = (p) => {
    setForm(p);
    setEditId(p.id);
  };

  const deletePuzzle = async (id) => {
    await db.collection("puzzles").doc(id).delete();
  };

  // 📸 Bild verkleinern
  const handleImageUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const img = new Image();
    const reader = new FileReader();

    reader.onload = (event) => {
      img.src = event.target.result;
    };

    img.onload = () => {
      const canvas = document.createElement("canvas");
      const ctx = canvas.getContext("2d");

      const maxWidth = 800;
      const scale = maxWidth / img.width;

      canvas.width = maxWidth;
      canvas.height = img.height * scale;

      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);

      const compressed = canvas.toDataURL("image/jpeg", 0.7);

      setForm(prev => ({ ...prev, image: compressed }));
    };

    reader.readAsDataURL(file);
  };

  const filtered = puzzles.filter(p => {
    const text = search.toLowerCase();
    const matchesSearch =
      p.name.toLowerCase().includes(text) ||
      p.brand.toLowerCase().includes(text);

    const matchesFilter = filter === "Alle" || p.status === filter;

    return matchesSearch && matchesFilter;
  });

  return (
    <div className="p-6">
      <h1 className="text-3xl font-bold mb-4">🧩 Meine Puzzle Sammlung (Cloud)</h1>

      {/* Formular */}
      <div className="bg-white p-4 rounded shadow mb-4 grid gap-2">
        <input placeholder="Motiv" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
        <input placeholder="Teile" type="number" value={form.pieces} onChange={e=>setForm({...form,pieces:e.target.value})}/>
        <input placeholder="Hersteller" value={form.brand} onChange={e=>setForm({...form,brand:e.target.value})}/>

        <select value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>
          <option>Nicht gebaut</option>
          <option>In Arbeit</option>
          <option>Fertig</option>
        </select>

        <input placeholder="Bewertung" type="number" value={form.rating} onChange={e=>setForm({...form,rating:e.target.value})}/>

        <input type="file" onChange={handleImageUpload}/>

        <button className="bg-blue-500 text-white p-2 rounded" onClick={addOrUpdatePuzzle}>
          {editId ? "💾 Speichern" : "➕ Hinzufügen"}
        </button>
      </div>

      {/* Suche */}
      <div className="flex gap-2 mb-4">
        <input placeholder="Suchen..." value={search} onChange={e=>setSearch(e.target.value)} />
        <select value={filter} onChange={e=>setFilter(e.target.value)}>
          <option>Alle</option>
          <option>Nicht gebaut</option>
          <option>In Arbeit</option>
          <option>Fertig</option>
        </select>
      </div>

      {/* Liste */}
      {filtered.map(p => (
        <div key={p.id} className="bg-white p-3 rounded shadow mb-3">
          <b>{p.name}</b> ({p.pieces} Teile)
          <div>{p.brand}</div>
          <div>{p.status}</div>
          <div>⭐ {p.rating || "-"}</div>

          {p.image && (
            <img 
              src={p.image} 
              width="100"
              className="cursor-pointer"
              onClick={() => setSelectedImage(p.image)}
            />
          )}

          <div className="mt-2 flex gap-2">
            <button onClick={()=>editPuzzle(p)}>✏️ Bearbeiten</button>
            <button onClick={()=>deletePuzzle(p.id)}>❌ Löschen</button>
          </div>
        </div>
      ))}

      {/* 🔍 Vollbild Bild */}
      {selectedImage && (
        <div 
          className="fixed inset-0 bg-black bg-opacity-80 flex items-center justify-center"
          onClick={() => setSelectedImage(null)}
        >
          <img src={selectedImage} className="max-w-full max-h-full" />
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
