<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puzzle App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>

<body class="bg-gray-100">
<div id="root"></div>

<script type="text/babel">

const { useState, useEffect } = React;

function App() {
  const [puzzles, setPuzzles] = useState([]);
  const [name, setName] = useState("");

  useEffect(() => {
    const saved = localStorage.getItem("puzzles");
    if (saved) setPuzzles(JSON.parse(saved));
  }, []);

  useEffect(() => {
    localStorage.setItem("puzzles", JSON.stringify(puzzles));
  }, [puzzles]);

  const addPuzzle = () => {
    if (!name) return;
    setPuzzles([...puzzles, { id: Date.now(), name }]);
    setName("");
  };

  return (
    <div className="p-6">
      <h1 className="text-2xl font-bold mb-4">🧩 Meine Puzzle</h1>

      <input
        className="border p-2 mr-2"
        value={name}
        onChange={e => setName(e.target.value)}
        placeholder="Puzzle Name"
      />

      <button className="bg-blue-500 text-white p-2" onClick={addPuzzle}>
        Hinzufügen
      </button>

      <ul className="mt-4">
        {puzzles.map(p => (
          <li key={p.id}>{p.name}</li>
        ))}
      </ul>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script>
</body>
</html>
