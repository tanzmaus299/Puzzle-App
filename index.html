<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puzzle App</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#3b82f6">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>

<body class="bg-gray-100 dark:bg-gray-900">
<div id="root"></div>

<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("service-worker.js");
}
</script>

<script type="text/babel">
const { useState, useEffect } = React;

const firebaseConfig = {
  apiKey: "DEIN_API_KEY",
  authDomain: "puzzle-app-f4ad3.firebaseapp.com",
  projectId: "puzzle-app-f4ad3",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function App(){

  const [puzzles,setPuzzles] = useState([]);
  const [view,setView] = useState("home");
  const [dark,setDark] = useState(localStorage.getItem("dark")==="true");
  const [form,setForm] = useState({name:"",pieces:"",brand:"",image:""});
  const [showForm,setShowForm] = useState(false);
  const [editId,setEditId] = useState(null);

  const [importDataFile,setImportDataFile] = useState(null);
  const [showImportModal,setShowImportModal] = useState(false);

  useEffect(()=>{
    const unsub = db.collection("puzzles").onSnapshot(snap=>{
      setPuzzles(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
    return ()=>unsub();
  },[]);

  useEffect(()=>{
    document.documentElement.classList.toggle("dark",dark);
    localStorage.setItem("dark",dark);
  },[dark]);

  const isDuplicate = (puzzle, list) => {
    return list.some(p =>
      p.name?.toLowerCase().trim() === puzzle.name?.toLowerCase().trim() &&
      p.brand?.toLowerCase().trim() === puzzle.brand?.toLowerCase().trim() &&
      String(p.pieces) === String(puzzle.pieces)
    );
  };

  const save = async ()=>{
    if(!form.name) return;

    if(isDuplicate(form,puzzles)){
      if(!confirm("Dieses Puzzle existiert bereits. Trotzdem speichern?")) return;
    }

    if(editId){
      await db.collection("puzzles").doc(editId).set(form);
      setEditId(null);
    } else {
      await db.collection("puzzles").add(form);
    }

    setForm({name:"",pieces:"",brand:"",image:""});
    setShowForm(false);
  };

  const del = async (id)=>{
    if(!confirm("Wirklich löschen?")) return;
    await db.collection("puzzles").doc(id).delete();
  };

  const exportData = ()=>{
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(puzzles));
    const a = document.createElement("a");
    a.href = dataStr;
    a.download = "puzzle-backup.json";
    a.click();
  };

  const handleImportFile = (e)=>{
    const file = e.target.files[0];
    if(!file) return;
    setImportDataFile(file);
    setShowImportModal(true);
  };

  const processImport = async (mode)=>{
    if(!importDataFile) return;

    const reader = new FileReader();

    reader.onload = async (event)=>{
      const data = JSON.parse(event.target.result);

      if(mode==="replace"){
        if(!confirm("Alle bestehenden Daten löschen?")) return;

        const snapshot = await db.collection("puzzles").get();
        const batch = db.batch();
        snapshot.docs.forEach(doc=>batch.delete(doc.ref));
        await batch.commit();
      }

      for(const p of data){
        if(mode==="skip"){
          if(isDuplicate(p,puzzles)) continue;
        }
        await db.collection("puzzles").add(p);
      }

      alert("Import abgeschlossen!");
      setShowImportModal(false);
      setImportDataFile(null);
    };

    reader.readAsText(importDataFile);
  };

  return(
    <div className="p-4 max-w-md mx-auto text-gray-800 dark:text-gray-100">

      <div className="flex justify-between mb-4">
        <button onClick={()=>setView(view==="home"?"list":"home")}>
          {view==="home"?"📋":"🏠"}
        </button>

        <div className="flex gap-2">
          <button onClick={()=>setDark(!dark)}>
            {dark?"☀️":"🌙"}
          </button>

          <button onClick={exportData}>💾</button>

          <label className="cursor-pointer">
            📂
            <input type="file" hidden onChange={handleImportFile}/>
          </label>
        </div>
      </div>

      {view==="home" && (
        <div>
          <h2 className="text-xl mb-2">Gesamt: {puzzles.length}</h2>
          <button onClick={()=>setView("list")} className="bg-blue-500 text-white p-2 rounded">
            Alle anzeigen
          </button>
        </div>
      )}

      {view==="list" && (
        <div>
          {puzzles.map(p=>(
            <div key={p.id} className="bg-white dark:bg-gray-800 p-3 mb-3 rounded shadow">
              <b>{p.name}</b><br/>
              {p.brand}<br/>
              {p.pieces} Teile

              <div className="flex gap-2 mt-2">
                <button onClick={()=>{setForm(p);setEditId(p.id);setShowForm(true)}}>✏️</button>
                <button onClick={()=>del(p.id)}>🗑️</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {showForm && (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center">
          <div className="bg-white dark:bg-gray-800 p-4 rounded w-80">
            <input placeholder="Motiv" className="w-full mb-2" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
            <input placeholder="Teile" className="w-full mb-2" value={form.pieces} onChange={e=>setForm({...form,pieces:e.target.value})}/>
            <input placeholder="Hersteller" className="w-full mb-2" value={form.brand} onChange={e=>setForm({...form,brand:e.target.value})}/>

            <button onClick={save} className="bg-blue-500 text-white w-full mb-2">Speichern</button>
            <button onClick={()=>setShowForm(false)} className="w-full">Abbrechen</button>
          </div>
        </div>
      )}

      {showImportModal && (
        <div className="fixed inset-0 bg-black/50 flex items-center justify-center">
          <div className="bg-white dark:bg-gray-800 p-4 rounded w-80 space-y-2">
            <h2 className="font-bold">Import wählen</h2>

            <button onClick={()=>processImport("add")} className="w-full bg-blue-500 text-white p-2 rounded">
              ➕ Alles hinzufügen
            </button>

            <button onClick={()=>processImport("skip")} className="w-full bg-yellow-500 text-white p-2 rounded">
              🚫 Duplikate überspringen
            </button>

            <button onClick={()=>processImport("replace")} className="w-full bg-red-500 text-white p-2 rounded">
              🔄 Alles ersetzen
            </button>

            <button onClick={()=>setShowImportModal(false)} className="w-full">
              Abbrechen
            </button>
          </div>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
