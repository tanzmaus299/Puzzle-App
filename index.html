<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puzzle App</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = { darkMode: 'class' }
  </script>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>

<body class="bg-gray-100 dark:bg-gray-900">
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect } = React;

const firebaseConfig = {
  apiKey: "DEIN_API_KEY",
  authDomain: "puzzle-app-f4ad3.firebaseapp.com",
  projectId: "puzzle-app-f4ad3",
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

function App(){

  const [puzzles,setPuzzles] = useState([]);
  const [view,setView] = useState("home");
  const [dark,setDark] = useState(localStorage.getItem("dark")==="true");
  const [form,setForm] = useState({name:"",pieces:"",brand:"",image:""});
  const [showForm,setShowForm] = useState(false);
  const [editId,setEditId] = useState(null);

  useEffect(()=>{
    const unsub = db.collection("puzzles").onSnapshot(snap=>{
      setPuzzles(snap.docs.map(d=>({id:d.id,...d.data()})));
    });
    return ()=>unsub();
  },[]);

  useEffect(()=>{
    document.documentElement.classList.toggle("dark",dark);
    localStorage.setItem("dark",dark);
  },[dark]);

  const save = async ()=>{
    if(!form.name) return;

    if(editId){
      await db.collection("puzzles").doc(editId).set(form);
      setEditId(null);
    } else {
      await db.collection("puzzles").add(form);
    }

    setForm({name:"",pieces:"",brand:"",image:""});
    setShowForm(false);
  };

  const del = async (id)=>{
    if(!confirm("Wirklich löschen?")) return;
    await db.collection("puzzles").doc(id).delete();
  };

  const exportData = ()=>{
    const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(puzzles));
    const a = document.createElement("a");
    a.href = dataStr;
    a.download = "puzzle-backup.json";
    a.click();
  };

  const importData = async (e)=>{
    const file = e.target.files[0];
    if(!file) return;

    const reader = new FileReader();

    reader.onload = async (event)=>{
      const data = JSON.parse(event.target.result);

      if(!confirm("Backup wirklich importieren? Bestehende Daten bleiben erhalten.")) return;

      for(const p of data){
        await db.collection("puzzles").add(p);
      }

      alert("Import abgeschlossen!");
    };

    reader.readAsText(file);
  };

  return(
    <div className="p-4 max-w-md mx-auto text-gray-800 dark:text-gray-100">

      <div className="flex justify-between mb-4">
        <button onClick={()=>setView(view==="home"?"list":"home")}>
          {view==="home"?"📋":"🏠"}
        </button>

        <div className="flex gap-2">
          <button onClick={()=>setDark(!dark)}>
            {dark?"☀️":"🌙"}
          </button>

          <button onClick={exportData}>💾</button>

          <label className="cursor-pointer">
            📂
            <input type="file" hidden onChange={importData}/>
          </label>
        </div>
      </div>

      {view==="home" && (
        <div>
          <h2>Gesamt: {puzzles.length}</h2>

          <button onClick={()=>setView("list")}>
            Alle Puzzle anzeigen
          </button>
        </div>
      )}

      {view==="list" && (
        <div>
          {puzzles.map(p=>(
            <div key={p.id} className="border p-2 mb-2">
              <b>{p.name}</b><br/>
              {p.brand}<br/>
              {p.pieces} Teile

              <div>
                <button onClick={()=>{setForm(p);setEditId(p.id);setShowForm(true)}}>✏️</button>
                <button onClick={()=>del(p.id)}>🗑️</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {showForm && (
        <div>
          <input placeholder="Motiv" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
          <input placeholder="Teile" value={form.pieces} onChange={e=>setForm({...form,pieces:e.target.value})}/>
          <input placeholder="Hersteller" value={form.brand} onChange={e=>setForm({...form,brand:e.target.value})}/>

          <button onClick={save}>Speichern</button>
          <button onClick={()=>setShowForm(false)}>Abbrechen</button>
        </div>
      )}

    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>

</body>
</html>
