<!DOCTYPE html><html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Puzzle App</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head><body class="bg-gray-100">
<div id="root"></div><script type="text/babel">

const { useState, useEffect } = React;

function App() {
  const [puzzles, setPuzzles] = useState([]);
  const [search, setSearch] = useState("");
  const [filter, setFilter] = useState("Alle");
  const [form, setForm] = useState({
    name: "",
    pieces: "",
    brand: "",
    status: "Nicht gebaut",
    rating: "",
    image: "",
  });

  useEffect(() => {
    const saved = localStorage.getItem("puzzles");
    if (saved) setPuzzles(JSON.parse(saved));
  }, []);

  useEffect(() => {
    localStorage.setItem("puzzles", JSON.stringify(puzzles));
  }, [puzzles]);

  const addPuzzle = () => {
    if (!form.name || !form.pieces) return;
    setPuzzles([...puzzles, { ...form, id: Date.now() }]);
    setForm({ name:"", pieces:"", brand:"", status:"Nicht gebaut", rating:"", image:"" });
  };

  const deletePuzzle = (id) => {
    setPuzzles(puzzles.filter(p => p.id !== id));
  };

  const handleImageUpload = (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => setForm({ ...form, image: reader.result });
    reader.readAsDataURL(file);
  };

  const filtered = puzzles.filter(p =>
    p.name.toLowerCase().includes(search.toLowerCase()) &&
    (filter === "Alle" || p.status === filter)
  );

  const totalPuzzles = puzzles.length;
  const totalPieces = puzzles.reduce((sum, p) => sum + Number(p.pieces || 0), 0);
  const finished = puzzles.filter(p => p.status === "Fertig").length;
  const inProgress = puzzles.filter(p => p.status === "In Arbeit").length;

  return (
    <div className="p-6">
      <h1 className="text-3xl font-bold mb-4">🧩 Meine Puzzle Sammlung</h1>

      {/* Statistik */}
      <div className="grid grid-cols-2 gap-3 mb-6">
        <div className="bg-white p-3 rounded shadow">Puzzle: {totalPuzzles}</div>
        <div className="bg-white p-3 rounded shadow">Teile: {totalPieces}</div>
        <div className="bg-white p-3 rounded shadow">Fertig: {finished}</div>
        <div className="bg-white p-3 rounded shadow">In Arbeit: {inProgress}</div>
      </div>

      {/* Formular */}
      <div className="bg-white p-4 rounded shadow mb-4 grid gap-2">
        <input placeholder="Motiv" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/>
        <input placeholder="Teile" type="number" value={form.pieces} onChange={e=>setForm({...form,pieces:e.target.value})}/>
        <input placeholder="Hersteller" value={form.brand} onChange={e=>setForm({...form,brand:e.target.value})}/>

        <select value={form.status} onChange={e=>setForm({...form,status:e.target.value})}>
          <option>Nicht gebaut</option>
          <option>In Arbeit</option>
          <option>Fertig</option>
        </select>

        <input placeholder="Bewertung" type="number" value={form.rating} onChange={e=>setForm({...form,rating:e.target.value})}/>

        <input type="file" onChange={handleImageUpload}/>

        <button className="bg-blue-500 text-white p-2 rounded" onClick={addPuzzle}>➕ Hinzufügen</button>
      </div>

      {/* Suche */}
      <div className="flex gap-2 mb-4">
        <input placeholder="Suchen..." value={search} onChange={e=>setSearch(e.target.value)} />
        <select value={filter} onChange={e=>setFilter(e.target.value)}>
          <option>Alle</option>
          <option>Nicht gebaut</option>
          <option>In Arbeit</option>
          <option>Fertig</option>
        </select>
      </div>

      {/* Liste */}
      {filtered.map(p => (
        <div key={p.id} className="bg-white p-3 rounded shadow mb-3">
          <b>{p.name}</b> ({p.pieces} Teile)
          <div>{p.brand}</div>
          <div>{p.status}</div>
          <div>⭐ {p.rating || "-"}</div>
          {p.image && <img src={p.image} width="100"/>}
          <button onClick={()=>deletePuzzle(p.id)}>❌ Löschen</button>
        </div>
      ))}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);

</script></body>
</html>
